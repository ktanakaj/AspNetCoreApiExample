services:
  exampleapp:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      EXAMPLEAPP_DATABASE__CONNECTIONSTRING: "server=exampledb-container; port=3306; user=blog_usr; password=blog001; database=blog_db"
  examplemigration:
    environment:
      DB_HOST: exampledb
      DB_NAME: blog_db
      DB_USER: blog_usr
      DB_PASSWORD: blog001
  examplenginx:
    ports:
      - 5000:80
    environment:
      NGINX_PORT: 80
      BACKEND_SERVER: exampleapp:8080
  exampledb:
    environment:
      MYSQL_ROOT_PASSWORD: root001
      MYSQL_DATABASE: blog_db
      MYSQL_USER: blog_usr
      MYSQL_PASSWORD: blog001
    ports:
      - 3306:3306
